<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>和差算メーカー Pro</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      overscroll-behavior-y: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .transition-all-custom {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useMemo } = React;

    // --- アイコン ---
    const Lock = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    );

    const Unlock = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
      </svg>
    );

    const Users = ({ size = 20, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
      </svg>
    );

    // --- メインアプリケーション ---
    const MAX_SCALE = 60; // 最大60cmに変更

    function WasazanApp() {
      const [mode, setMode] = useState(2); // 2人 or 3人
      const [lengths, setLengths] = useState({
        pink: 20,
        blue: 30,
        yellow: 10
      });
      const [locked, setLocked] = useState({
        pink: false,
        blue: false,
        yellow: false
      });
      const [isSumFixed, setIsSumFixed] = useState(false);
      const [draggingColor, setDraggingColor] = useState(null);

      // モードに基づいた計算
      const activeColors = useMemo(() => {
        return mode === 2 ? ['pink', 'blue'] : ['pink', 'blue', 'yellow'];
      }, [mode]);

      const sum = activeColors.reduce((acc, color) => acc + lengths[color], 0);
      const average = sum / mode;
      const displayAverage = Number.isInteger(average) ? average : average.toFixed(1);

      // 長さを更新するロジック
      const requestLengthChange = (color, targetCm) => {
        if (locked[color]) return;

        setLengths(prev => {
          if (prev[color] === targetCm) return prev;
          
          if (!isSumFixed) return { ...prev, [color]: targetCm };

          // 和を固定する場合の調整
          const diff = targetCm - prev[color];
          const adjustableColors = activeColors.filter(c => c !== color && !locked[c]);
          
          if (adjustableColors.length === 0) return prev;

          let nextObj = { ...prev };

          // 増減を他のバーに分散させる（簡易的ロジック：最大/最小のものから削る/足す）
          if (diff > 0) {
            let actualIncrease = 0;
            for (let i = 0; i < diff; i++) {
              let maxColor = null;
              let maxVal = -1;
              for (const c of adjustableColors) {
                if (nextObj[c] > maxVal && nextObj[c] > 0) {
                  maxVal = nextObj[c];
                  maxColor = c;
                }
              }
              if (!maxColor) break;
              nextObj[maxColor] -= 1;
              actualIncrease += 1;
            }
            nextObj[color] += actualIncrease;
          } else if (diff < 0) {
            let absDiff = Math.abs(diff);
            for (let i = 0; i < absDiff; i++) {
              let minColor = null;
              let minVal = Infinity;
              for (const c of adjustableColors) {
                if (nextObj[c] < minVal && nextObj[c] < MAX_SCALE) {
                  minVal = nextObj[c];
                  minColor = c;
                }
              }
              if (!minColor) break;
              nextObj[minColor] += 1;
              nextObj[color] -= 1;
            }
          }
          return nextObj;
        });
      };

      const toggleLock = (color) => {
        setLocked(prev => ({ ...prev, [color]: !prev[color] }));
      };

      const renderGrid = () => {
        const lines = [];
        for (let i = 0; i <= MAX_SCALE; i++) {
          const isTen = i % 10 === 0;
          const isFive = i % 5 === 0 && !isTen;
          lines.push(
            <div 
              key={i} 
              className={`absolute top-0 bottom-0 border-l ${isTen ? 'border-gray-400 z-0' : isFive ? 'border-gray-300' : 'border-gray-100'}`}
              style={{ left: `${(i / MAX_SCALE) * 100}%` }}
            >
              {isTen && (
                <span className="absolute bottom-1 -translate-x-1/2 text-[10px] text-gray-500 font-bold bg-white/50 px-0.5 rounded">
                  {i}
                </span>
              )}
            </div>
          );
        }
        return lines;
      };

      return (
        <div className="min-h-[100dvh] flex flex-col font-sans text-gray-800 touch-pan-y bg-slate-50">
          <div className="w-full max-w-md mx-auto bg-white flex-1 flex flex-col shadow-2xl overflow-hidden border-x border-gray-200">
            
            <header className="bg-indigo-600 py-3 px-4 text-center shrink-0 shadow-md">
              <h1 className="text-xl font-black text-white tracking-tighter italic">和差算メーカー PRO</h1>
            </header>

            <main className="flex-1 flex flex-col p-4 gap-4 overflow-hidden">
              
              {/* モード切替 & 和の固定 */}
              <div className="grid grid-cols-2 gap-3 shrink-0">
                <div className="bg-white border-2 border-slate-200 p-2 rounded-2xl flex flex-col items-center justify-between gap-1 shadow-sm">
                  <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">人数モード</span>
                  <div className="flex bg-slate-100 p-1 rounded-xl w-full">
                    <button 
                      onClick={() => setMode(2)}
                      className={`flex-1 py-1 text-sm font-bold rounded-lg transition-all ${mode === 2 ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400'}`}
                    >2つ</button>
                    <button 
                      onClick={() => setMode(3)}
                      className={`flex-1 py-1 text-sm font-bold rounded-lg transition-all ${mode === 3 ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400'}`}
                    >3つ</button>
                  </div>
                </div>

                <div className="bg-white border-2 border-slate-200 p-2 rounded-2xl flex flex-col items-center justify-between gap-1 shadow-sm">
                  <span className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">和（合計）を固定</span>
                  <button 
                    className={`w-full py-1.5 rounded-xl transition-all flex items-center justify-center gap-2 border-2 ${isSumFixed ? 'bg-purple-50 border-purple-200 text-purple-700' : 'bg-slate-50 border-slate-100 text-slate-400'}`}
                    onClick={() => setIsSumFixed(!isSumFixed)}
                  >
                    {isSumFixed ? <Lock size={14} /> : <Unlock size={14} />}
                    <span className="text-sm font-black">{isSumFixed ? "ON" : "OFF"}</span>
                  </button>
                </div>
              </div>

              {/* メイン可視化エリア */}
              <div className="flex-1 relative bg-white border-2 border-slate-200 rounded-3xl shadow-inner flex flex-col overflow-hidden">
                <div className="relative flex-1 mr-12 ml-12 mb-8 mt-6">
                  {renderGrid()}
                  
                  <div className={`relative z-10 flex flex-col h-full py-2 transition-all duration-500 ${mode === 2 ? 'justify-around' : 'justify-between'}`}>
                    <RibbonTrack 
                      color="pink" bgClass="bg-pink-400" length={lengths.pink} isLocked={locked.pink}
                      onChange={requestLengthChange} onToggleLock={() => toggleLock('pink')}
                      draggingColor={draggingColor} setDraggingColor={setDraggingColor} 
                    />
                    
                    <DiffIndicator val1={lengths.pink} val2={lengths.blue} />
                    
                    <RibbonTrack 
                      color="blue" bgClass="bg-sky-400" length={lengths.blue} isLocked={locked.blue}
                      onChange={requestLengthChange} onToggleLock={() => toggleLock('blue')}
                      draggingColor={draggingColor} setDraggingColor={setDraggingColor} 
                    />

                    {mode === 3 && (
                      <React.Fragment>
                        <DiffIndicator val1={lengths.blue} val2={lengths.yellow} />
                        <RibbonTrack 
                          color="yellow" bgClass="bg-amber-400" length={lengths.yellow} isLocked={locked.yellow}
                          onChange={requestLengthChange} onToggleLock={() => toggleLock('yellow')}
                          draggingColor={draggingColor} setDraggingColor={setDraggingColor} 
                        />
                      </React.Fragment>
                    )}
                  </div>
                </div>
              </div>

              {/* 数値表示 */}
              <div className="flex gap-3 shrink-0">
                <div className="flex-1 bg-emerald-50 border-2 border-emerald-100 rounded-2xl p-3 flex flex-col items-center justify-center shadow-sm">
                  <span className="text-[10px] font-black text-emerald-700 uppercase tracking-widest mb-1">SUM 和</span>
                  <div className="text-3xl font-black text-emerald-600 tabular-nums">
                    {sum}<span className="text-sm ml-1">cm</span>
                  </div>
                </div>
                <div className="flex-1 bg-cyan-50 border-2 border-cyan-100 rounded-2xl p-3 flex flex-col items-center justify-center shadow-sm">
                  <span className="text-[10px] font-black text-cyan-700 uppercase tracking-widest mb-1">AVG 平均</span>
                  <div className="text-3xl font-black text-cyan-600 tabular-nums">
                    {displayAverage}<span className="text-sm ml-1">cm</span>
                  </div>
                </div>
              </div>

              <div className="bg-slate-800 rounded-2xl p-3 flex gap-3 items-center shrink-0 shadow-lg">
                <div className="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-white shrink-0">
                  <span className="text-xs font-bold">i</span>
                </div>
                <p className="text-[11px] font-bold text-slate-300 leading-snug">
                  {mode === 2 ? "2つの数の和差算モードです。平均は (和 ÷ 2) で計算されます。" : "3つの数の和差算モードです。平均は (和 ÷ 3) で計算されます。"}
                  <br/>
                  バーの右端をスワイプして動かそう！
                </p>
              </div>

            </main>
          </div>
        </div>
      );
    }

    function RibbonTrack({ color, bgClass, length, isLocked, onChange, onToggleLock, draggingColor, setDraggingColor }) {
      const trackRef = useRef(null);

      const update = (e) => {
        if (!trackRef.current || isLocked) return;
        const rect = trackRef.current.getBoundingClientRect();
        const x = e.clientX - rect.left;
        let cm = Math.round((x / rect.width) * MAX_SCALE);
        cm = Math.max(0, Math.min(cm, MAX_SCALE));
        onChange(color, cm);
      };

      const handlePointerDown = (e) => {
        if (isLocked) return;
        e.currentTarget.setPointerCapture(e.pointerId);
        setDraggingColor(color);
        update(e);
      };

      const handlePointerMove = (e) => {
        if (draggingColor === color && !isLocked) {
          update(e);
        }
      };

      const handlePointerUp = (e) => {
        e.currentTarget.releasePointerCapture(e.pointerId);
        setDraggingColor(null);
      };

      const isDragging = draggingColor === color;

      return (
        <div className="relative h-14 w-full flex items-center group">
          {/* ロックボタン */}
          <button 
            onClick={onToggleLock}
            className={`absolute -left-10 w-8 h-8 flex items-center justify-center rounded-xl border-2 shadow-sm transition-all z-20
              ${isLocked ? 'bg-rose-500 border-rose-400 text-white' : 'bg-white border-slate-200 text-slate-400 hover:bg-slate-50'}`}
          >
            {isLocked ? <Lock size={16} /> : <Unlock size={16} />}
          </button>

          <div 
            ref={trackRef}
            className={`flex-1 h-full touch-none flex flex-col justify-center ${isLocked ? 'cursor-not-allowed' : 'cursor-pointer'}`}
            onPointerDown={handlePointerDown}
            onPointerMove={handlePointerMove}
            onPointerUp={handlePointerUp}
            onPointerCancel={handlePointerUp}
          >
            <div className="flex items-center w-full relative z-10 pointer-events-none">
              {/* リボン本体 */}
              <div 
                className={`h-9 rounded-r-xl ${bgClass} shadow-md border-y border-r border-black/10 flex items-center justify-end relative
                  ${isDragging ? '' : 'transition-[width] duration-200 ease-out'}
                  ${isLocked ? 'opacity-40 grayscale-[0.5]' : ''}`}
                style={{ width: `${(length / MAX_SCALE) * 100}%`, minWidth: '4px' }}
              >
                {!isLocked && (
                  <div className={`absolute -right-3 w-6 h-10 flex items-center justify-center ${isDragging ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'} transition-opacity`}>
                    <div className="w-1.5 h-6 bg-white/40 rounded-full"></div>
                  </div>
                )}
              </div>
              
              {/* 数値ラベル */}
              <div 
                className={`absolute ${isDragging ? '' : 'transition-[left] duration-200 ease-out'}`} 
                style={{ left: `calc(${(length / MAX_SCALE) * 100}% + 8px)` }}
              >
                <span className={`text-sm font-black tabular-nums bg-white shadow-sm border border-slate-200 px-2 py-0.5 rounded-lg ${isLocked ? 'text-slate-400' : 'text-slate-700'}`}>
                  {length}
                </span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function DiffIndicator({ val1, val2 }) {
      const diff = Math.abs(val1 - val2);
      const min = Math.min(val1, val2);
      
      const center = min + diff / 2;
      const leftPercent = (center / MAX_SCALE) * 100;

      if (diff === 0) return <div className="h-6" />;

      return (
        <div className="h-8 relative w-full z-10 pointer-events-none">
          <div 
            className="absolute top-1/2 -translate-y-1/2 h-[2px] bg-orange-200"
            style={{ 
              left: `${(min / MAX_SCALE) * 100}%`, 
              width: `${(diff / MAX_SCALE) * 100}%`,
              transition: 'all 0.2s ease-out'
            }}
          />
          <div 
            className="absolute top-1/2 -translate-y-1/2 -translate-x-1/2 bg-orange-500 text-white font-black text-[10px] px-2 py-0.5 rounded-full shadow-md whitespace-nowrap transition-all duration-200 ease-out border border-orange-400"
            style={{ left: `${leftPercent}%` }}
          >
            差: {diff}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<WasazanApp />);
  </script>
</body>
</html>
