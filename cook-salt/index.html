<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>味付け計算機</title>
    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (動作エンジン) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel (コード翻訳用) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* iPhoneでのタップ時のハイライトを消す */
        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // アイコンコンポーネント (SVG直接記述で依存関係を排除)
        const ChefHat = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-12 h-12 mx-auto mb-2 relative z-10"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z" /><line x1="6" y1="17" x2="18" y2="17" /></svg>
        );
        const Scale = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 mr-2"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z" /><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z" /><path d="M7 21h10" /><path d="M12 3v18" /><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2" /></svg>
        );
        const Info = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 mr-1"><circle cx="12" cy="12" r="10" /><path d="M12 16v-4" /><path d="M12 8h.01" /></svg>
        );
        const Droplets = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-amber-700"><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z" /><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.35" /></svg>
        );
        const Utensils = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-orange-700"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2" /><path d="M7 2v20" /><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" /></svg>
        );

        function App() {
            const [weight, setWeight] = useState('');
            const [tasteLevel, setTasteLevel] = useState('normal');
            const [dashiSalt, setDashiSalt] = useState('');
            const [soySaucePct, setSoySaucePct] = useState('');
            const [misoPct, setMisoPct] = useState('');

            const TASTE_RATIOS = {
                light: { label: '薄め', ratio: 0.006, description: '塩分 0.6% (減塩・素材の味重視)' },
                normal: { label: '普通', ratio: 0.008, description: '塩分 0.8% (一般的な美味しい味)' },
                strong: { label: '濃いめ', ratio: 0.010, description: '塩分 1.0% (ご飯が進むしっかり味)' },
            };

            const SEASONINGS = [
                { id: 'salt', name: '塩', saltContent: 1.0, unit: 'g', type: 'solid', color: 'bg-slate-100 border-slate-300 text-slate-700', icon: <span>🧂</span> },
                { id: 'soySauce', name: '醤油', saltContent: 0.16, unit: 'ml', type: 'liquid', color: 'bg-amber-50 border-amber-200 text-amber-900', icon: <Droplets /> },
                { id: 'miso', name: '味噌', saltContent: 0.12, unit: 'g', type: 'paste', color: 'bg-orange-50 border-orange-200 text-orange-900', icon: <Utensils /> },
            ];

            const getSpoonMeasurement = (amount, type) => {
                let tspWeight = 5;
                let tbspWeight = 15;

                if (type === 'solid' || type === 'paste') {
                    tspWeight = 6;
                    tbspWeight = 18;
                } else if (type === 'liquid') {
                    tspWeight = 5;
                    tbspWeight = 15;
                }

                if (amount < tspWeight / 2) return "少々";

                const simpleTbsp = (amount / tbspWeight).toFixed(1);
                if (amount >= tbspWeight) {
                    return `大さじ ${simpleTbsp}`;
                } else {
                    const simpleTsp = (amount / tspWeight).toFixed(1);
                    return `小さじ ${simpleTsp}`;
                }
            };

            const calculateAmount = (item) => {
                const w = parseFloat(weight);
                if (isNaN(w) || w <= 0) return 0;

                const targetSaltAmount = w * TASTE_RATIOS[tasteLevel].ratio;
                const dashiSaltAmount = parseFloat(dashiSalt) || 0;
                const remainingSalt = Math.max(0, targetSaltAmount - dashiSaltAmount);

                let saltContent = item.saltContent;
                if (item.id === 'soySauce' && soySaucePct !== '') {
                    saltContent = parseFloat(soySaucePct) / 100;
                }
                if (item.id === 'miso' && misoPct !== '') {
                    saltContent = parseFloat(misoPct) / 100;
                }
                if (!saltContent || saltContent <= 0) return 0;
                return remainingSalt / saltContent;
            };

            return (
                <div className="flex flex-col items-center min-h-screen bg-gray-100 font-sans text-gray-800">
                    <div className="max-w-md w-full bg-white">

                        {/* ヘッダー */}
                        <div className="bg-orange-500 px-4 py-4 text-white text-center">
                            <h1 className="text-xl font-bold">味付け計算機</h1>
                        </div>

                        <div className="px-5 py-4 space-y-4">

                            {/* 材料の重さ */}
                            <div>
                                <label className="block text-base font-bold text-gray-800 mb-2">材料の重さ</label>
                                <div className="flex items-center gap-3">
                                    <div className="relative flex-1">
                                        <input
                                            type="number"
                                            value={weight}
                                            onChange={(e) => setWeight(e.target.value)}
                                            placeholder="200"
                                            className="w-full text-xl p-3 pr-10 border border-gray-200 rounded-xl focus:border-orange-400 outline-none bg-gray-50 text-right"
                                            inputMode="decimal"
                                        />
                                        <span className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500">g</span>
                                    </div>
                                    <Scale />
                                </div>
                            </div>

                            {/* 味の濃さ */}
                            <div>
                                <label className="block text-base font-bold text-gray-800 mb-2">味の濃さ</label>
                                <div className="flex gap-2 bg-gray-100 p-1 rounded-2xl">
                                    {Object.keys(TASTE_RATIOS).map((level) => (
                                        <button
                                            key={level}
                                            onClick={() => setTasteLevel(level)}
                                            className={`flex-1 py-2.5 text-sm font-bold rounded-xl transition-all duration-200 ${tasteLevel === level
                                                ? 'bg-orange-500 text-white shadow'
                                                : 'text-gray-500'}`}
                                        >
                                            {TASTE_RATIOS[level].label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <hr className="border-gray-200" />

                            {/* 計算結果 */}
                            <div>
                                <p className="text-base font-bold text-gray-800 mb-3">計算結果</p>
                                {(!weight || parseFloat(weight) <= 0) ? (
                                    <div className="text-center py-4 text-gray-400 text-sm border border-gray-200 rounded-2xl">
                                        材料の重さを入力してください
                                    </div>
                                ) : (() => {
                                    const w = parseFloat(weight);
                                    const targetSalt = w * TASTE_RATIOS[tasteLevel].ratio;
                                    const dashiSaltAmount = parseFloat(dashiSalt) || 0;
                                    if (dashiSaltAmount > 0 && dashiSaltAmount >= targetSalt) {
                                        return (
                                            <div className="text-center py-3 bg-green-50 rounded-2xl border border-green-200">
                                                <p className="text-green-700 font-bold">🎉 追加の調味料は不要です</p>
                                                <p className="text-gray-400 text-xs mt-1">目標 {Math.round(targetSalt * 10) / 10}g ／ だし {dashiSaltAmount}g</p>
                                            </div>
                                        );
                                    }
                                    return (
                                        <>
                                            {dashiSaltAmount > 0 && (
                                                <div className="text-xs text-blue-600 bg-blue-50 rounded-lg px-3 py-1.5 mb-2">
                                                    だし {dashiSaltAmount}g 差引 → 残り {Math.round((targetSalt - dashiSaltAmount) * 10) / 10}g 分
                                                </div>
                                            )}
                                            <div className="grid grid-cols-3 border border-gray-200 rounded-2xl overflow-hidden">
                                                {SEASONINGS.map((item, i) => {
                                                    const amount = calculateAmount(item);
                                                    return (
                                                        <div key={item.id} className={`text-center py-4 ${i < SEASONINGS.length - 1 ? 'border-r border-gray-200' : ''}`}>
                                                            <p className="text-sm text-gray-500 mb-1">{item.name}</p>
                                                            <p className="text-2xl font-bold text-gray-900 leading-none">
                                                                {Math.round(amount * 10) / 10}
                                                                <span className="text-sm font-normal text-gray-500 ml-0.5">{item.unit}</span>
                                                            </p>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </>
                                    );
                                })()}
                            </div>

                            <hr className="border-gray-200" />

                            {/* オプション設定 */}
                            <div>
                                <p className="text-base font-bold text-gray-800 mb-3">オプション設定</p>
                                <div className="space-y-3">
                                    {[
                                        { label: 'だし塩分', value: dashiSalt, onChange: setDashiSalt, placeholder: '0', unit: 'g' },
                                        { label: 'しょうゆ塩分', value: soySaucePct, onChange: setSoySaucePct, placeholder: '16', unit: '%' },
                                        { label: 'みそ塩分', value: misoPct, onChange: setMisoPct, placeholder: '12', unit: '%' },
                                    ].map(({ label, value, onChange, placeholder, unit }) => (
                                        <div key={label} className="flex items-center justify-between">
                                            <span className="text-base text-gray-700">{label}</span>
                                            <div className="relative">
                                                <input
                                                    type="number"
                                                    value={value}
                                                    onChange={(e) => onChange(e.target.value)}
                                                    placeholder={placeholder}
                                                    className="w-28 p-2 pr-8 border border-gray-200 rounded-xl bg-gray-50 text-right text-base font-medium outline-none focus:border-orange-400"
                                                    inputMode="decimal"
                                                />
                                                <span className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm">{unit}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
