<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>和差算メーカー</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (ブラウザ内でJSXを変換) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* スワイプ操作時の画面全体の不要なスクロールや選択を防ぐ */
    body {
      overscroll-behavior-y: none;
      user-select: none;
      -webkit-user-select: none;
    }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef } = React;

    // --- アイコンコンポーネント (Lucide Reactの代わり) ---
    const Lock = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
    );

    const Unlock = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 9.9-1"></path>
      </svg>
    );

    const Info = ({ size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="16" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12.01" y2="8"></line>
      </svg>
    );

    // --- メインアプリケーション ---
    const MAX_SCALE = 50; // 最大50cmまで表示

    function WasazanApp() {
      const [lengths, setLengths] = useState({
        pink: 10,
        blue: 15,
        yellow: 20
      });
      const [locked, setLocked] = useState({
        pink: false,
        blue: false,
        yellow: false
      });
      const [isSumFixed, setIsSumFixed] = useState(false);
      const [draggingColor, setDraggingColor] = useState(null);

      const sum = lengths.pink + lengths.blue + lengths.yellow;
      const average = sum / 3;
      const displayAverage = Number.isInteger(average) ? average : average.toFixed(1);

      // 長さを更新するロジック（和の固定と各リボンのロックを考慮）
      const requestLengthChange = (color, targetCm) => {
        if (locked[color]) return;

        setLengths(prev => {
          if (prev[color] === targetCm) return prev;
          
          if (!isSumFixed) return { ...prev, [color]: targetCm };

          let diff = targetCm - prev[color];
          const availableColors = Object.keys(prev).filter(c => c !== color && !locked[c]);
          
          if (availableColors.length === 0) return prev;

          let nextObj = { ...prev };

          if (diff > 0) {
            let actualIncrease = 0;
            for (let i = 0; i < diff; i++) {
              let maxColor = null;
              let maxVal = -1;
              for (const c of availableColors) {
                if (nextObj[c] > maxVal && nextObj[c] > 0) {
                  maxVal = nextObj[c];
                  maxColor = c;
                }
              }
              if (!maxColor) break;
              
              nextObj[maxColor] -= 1;
              actualIncrease += 1;
            }
            nextObj[color] += actualIncrease;
          } else if (diff < 0) {
            let absDiff = Math.abs(diff);
            for (let i = 0; i < absDiff; i++) {
              let minColor = null;
              let minVal = Infinity;
              for (const c of availableColors) {
                if (nextObj[c] < minVal) {
                  minVal = nextObj[c];
                  minColor = c;
                }
              }
              if (!minColor) break;

              nextObj[minColor] += 1;
              nextObj[color] -= 1;
            }
          }
          return nextObj;
        });
      };

      const toggleLock = (color) => {
        setLocked(prev => ({ ...prev, [color]: !prev[color] }));
      };

      // 背景のグリッド線を生成
      const renderGrid = () => {
        const lines = [];
        for (let i = 0; i <= MAX_SCALE; i++) {
          const isTen = i % 10 === 0;
          const isFive = i % 5 === 0 && !isTen;
          lines.push(
            <div 
              key={i} 
              className={`absolute top-0 bottom-0 border-l ${isTen ? 'border-gray-400 z-0' : isFive ? 'border-gray-300' : 'border-gray-100'}`}
              style={{ left: `${(i / MAX_SCALE) * 100}%` }}
            >
              {isTen && (
                <span className="absolute bottom-1 -translate-x-1/2 text-[10px] text-gray-500 font-bold bg-white/50 px-0.5 rounded">
                  {i}
                </span>
              )}
            </div>
          );
        }
        return lines;
      };

      return (
        <div className="min-h-[100dvh] flex flex-col font-sans text-gray-800 touch-pan-y">
          <div className="w-full max-w-md mx-auto bg-white flex-1 flex flex-col shadow-xl overflow-hidden">
            
            <header className="bg-blue-50 py-2 px-4 text-center border-b border-blue-100 shrink-0">
              <h1 className="text-lg font-bold text-blue-800 tracking-wider">和差算メーカー</h1>
            </header>

            <main className="flex-1 flex flex-col p-3 gap-3 overflow-hidden">
              
              <div className="flex items-center justify-between bg-white border border-gray-200 p-2 px-3 rounded-xl shadow-sm shrink-0">
                <div className="flex items-center gap-2">
                  {isSumFixed ? <Lock size={16} className="text-purple-600" /> : <Unlock size={16} className="text-gray-400" />}
                  <span className="text-sm font-bold text-gray-700">和（合計）を固定する</span>
                </div>
                <button 
                  className={`w-12 h-6 rounded-full p-1 transition-colors relative shadow-inner ${isSumFixed ? 'bg-purple-500' : 'bg-gray-300'}`}
                  onClick={() => setIsSumFixed(!isSumFixed)}
                >
                  <div className={`w-4 h-4 bg-white rounded-full shadow-sm transform transition-transform duration-200 ${isSumFixed ? 'translate-x-6' : 'translate-x-0'}`} />
                </button>
              </div>

              <div className="flex-1 relative bg-white border border-gray-300 rounded-xl shadow-inner flex flex-col min-h-[250px]">
                <div className="relative flex-1 mr-12 ml-10 mb-6 mt-4">
                  {renderGrid()}
                  
                  <div className="relative z-10 flex flex-col justify-between h-full py-2">
                    <RibbonTrack 
                      color="pink" bgClass="bg-pink-300" length={lengths.pink} isLocked={locked.pink}
                      onChange={requestLengthChange} onToggleLock={() => toggleLock('pink')}
                      draggingColor={draggingColor} setDraggingColor={setDraggingColor} 
                    />
                    <DiffIndicator val1={lengths.pink} val2={lengths.blue} />
                    <RibbonTrack 
                      color="blue" bgClass="bg-sky-300" length={lengths.blue} isLocked={locked.blue}
                      onChange={requestLengthChange} onToggleLock={() => toggleLock('blue')}
                      draggingColor={draggingColor} setDraggingColor={setDraggingColor} 
                    />
                    <DiffIndicator val1={lengths.blue} val2={lengths.yellow} />
                    <RibbonTrack 
                      color="yellow" bgClass="bg-yellow-300" length={lengths.yellow} isLocked={locked.yellow}
                      onChange={requestLengthChange} onToggleLock={() => toggleLock('yellow')}
                      draggingColor={draggingColor} setDraggingColor={setDraggingColor} 
                    />
                  </div>
                </div>
              </div>

              <div className="flex gap-2 shrink-0">
                <div className="flex-1 bg-green-50 border border-green-200 rounded-xl p-3 flex flex-col items-center justify-center shadow-sm">
                  <span className="text-xs font-bold text-green-700 mb-1">和（合計）</span>
                  <div className="text-2xl font-extrabold text-green-600 leading-none">
                    {sum}<span className="text-sm ml-0.5 font-bold">cm</span>
                  </div>
                </div>
                <div className="flex-1 bg-teal-50 border border-teal-200 rounded-xl p-3 flex flex-col items-center justify-center shadow-sm relative">
                  <span className="text-xs font-bold text-teal-700 mb-1">平均</span>
                  <div className="text-2xl font-extrabold text-teal-600 leading-none">
                    {displayAverage}<span className="text-sm ml-0.5 font-bold">cm</span>
                  </div>
                </div>
              </div>

              <div className="bg-gray-50 border border-gray-200 rounded-lg p-2 flex gap-2 items-center shrink-0">
                <Info size={16} className="text-gray-500 shrink-0" />
                <p className="text-[11px] font-medium text-gray-600 leading-tight">
                  🔒ボタンで長さを固定できます。<br/>
                  和を固定したままスワイプするとどうなるかな？
                </p>
              </div>

            </main>
          </div>
        </div>
      );
    }

    function RibbonTrack({ color, bgClass, length, isLocked, onChange, onToggleLock, draggingColor, setDraggingColor }) {
      const trackRef = useRef(null);

      const update = (e) => {
        if (!trackRef.current || isLocked) return;
        const rect = trackRef.current.getBoundingClientRect();
        const x = e.clientX - rect.left;
        let cm = Math.round((x / rect.width) * MAX_SCALE);
        cm = Math.max(0, Math.min(cm, MAX_SCALE));
        onChange(color, cm);
      };

      const handlePointerDown = (e) => {
        if (isLocked) return;
        e.currentTarget.setPointerCapture(e.pointerId);
        setDraggingColor(color);
        update(e);
      };

      const handlePointerMove = (e) => {
        if (draggingColor === color && !isLocked) {
          update(e);
        }
      };

      const handlePointerUp = (e) => {
        e.currentTarget.releasePointerCapture(e.pointerId);
        setDraggingColor(null);
      };

      const isDragging = draggingColor === color;

      return (
        <div className="relative h-12 w-full flex items-center group">
          <button 
            onClick={onToggleLock}
            className={`absolute -left-9 w-7 h-7 flex items-center justify-center rounded-full border shadow-sm transition-colors z-20
              ${isLocked ? 'bg-rose-100 border-rose-300 text-rose-600' : 'bg-white border-gray-300 text-gray-400 hover:bg-gray-50'}`}
          >
            {isLocked ? <Lock size={14} /> : <Unlock size={14} />}
          </button>

          <div 
            ref={trackRef}
            className={`flex-1 h-full touch-none flex flex-col justify-center ${isLocked ? 'cursor-not-allowed opacity-80' : 'cursor-pointer'}`}
            onPointerDown={handlePointerDown}
            onPointerMove={handlePointerMove}
            onPointerUp={handlePointerUp}
            onPointerCancel={handlePointerUp}
          >
            <div className="flex items-center w-full relative z-10 pointer-events-none">
              <div 
                className={`h-7 rounded-r-md ${bgClass} shadow-sm border border-black/10 flex items-center justify-end relative
                  ${isDragging ? '' : 'transition-[width] duration-100 ease-out'}`}
                style={{ width: `${(length / MAX_SCALE) * 100}%`, minWidth: '4px' }}
              >
                {!isLocked && (
                  <div className={`absolute -right-3 w-6 h-7 flex items-center justify-center ${isDragging ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'} transition-opacity`}>
                    <div className="w-1.5 h-4 bg-black/20 rounded-full"></div>
                  </div>
                )}
              </div>
              
              <div 
                className={`absolute ${isDragging ? '' : 'transition-[left] duration-100 ease-out'}`} 
                style={{ left: `calc(${(length / MAX_SCALE) * 100}% + 6px)` }}
              >
                <span className="text-sm font-extrabold text-gray-700 bg-white/80 px-1 rounded shadow-sm">
                  {length}
                </span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function DiffIndicator({ val1, val2 }) {
      const diff = Math.abs(val1 - val2);
      const min = Math.min(val1, val2);
      
      const center = min + diff / 2;
      const leftPercent = (center / MAX_SCALE) * 100;

      if (diff === 0) return <div className="h-6" />;

      return (
        <div className="h-8 relative w-full z-10 pointer-events-none">
          <div 
            className="absolute top-1/2 -translate-y-1/2 h-[1px] border-t-2 border-dashed border-orange-300"
            style={{ 
              left: `${(min / MAX_SCALE) * 100}%`, 
              width: `${(diff / MAX_SCALE) * 100}%`,
              transition: 'all 0.1s ease-out'
            }}
          />
          <div 
            className="absolute top-1/2 -translate-y-1/2 -translate-x-1/2 bg-orange-100 text-orange-800 font-bold text-[11px] px-1.5 py-0.5 rounded shadow-sm border border-orange-200 whitespace-nowrap transition-all duration-100 ease-out"
            style={{ left: `${leftPercent}%` }}
          >
            差: {diff} cm
          </div>
        </div>
      );
    }

    // アプリケーションのマウント
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<WasazanApp />);
  </script>
</body>
</html>
