<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>味付け計算機</title>
    <!-- Tailwind CSS (デザイン用) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM (動作エンジン) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel (コード翻訳用) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* iPhoneでのタップ時のハイライトを消す */
        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // アイコンコンポーネント (SVG直接記述で依存関係を排除)
        const ChefHat = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-12 h-12 mx-auto mb-2 relative z-10"><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z" /><line x1="6" y1="17" x2="18" y2="17" /></svg>
        );
        const Scale = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 mr-2"><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z" /><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z" /><path d="M7 21h10" /><path d="M12 3v18" /><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2" /></svg>
        );
        const Info = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 mr-1"><circle cx="12" cy="12" r="10" /><path d="M12 16v-4" /><path d="M12 8h.01" /></svg>
        );
        const Droplets = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-amber-700"><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z" /><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.35" /></svg>
        );
        const Utensils = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 text-orange-700"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2" /><path d="M7 2v20" /><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" /></svg>
        );

        function App() {
            const [weight, setWeight] = useState('');
            const [tasteLevel, setTasteLevel] = useState('normal');
            const [dashiSalt, setDashiSalt] = useState('');
            const [soySaucePct, setSoySaucePct] = useState('');
            const [misoPct, setMisoPct] = useState('');

            const TASTE_RATIOS = {
                light: { label: '薄め', ratio: 0.006, description: '塩分 0.6% (減塩・素材の味重視)' },
                normal: { label: '普通', ratio: 0.008, description: '塩分 0.8% (一般的な美味しい味)' },
                strong: { label: '濃いめ', ratio: 0.010, description: '塩分 1.0% (ご飯が進むしっかり味)' },
            };

            const SEASONINGS = [
                { id: 'salt', name: '塩', saltContent: 1.0, unit: 'g', type: 'solid', color: 'bg-slate-100 border-slate-300 text-slate-700', icon: <span className="text-xl">🧂</span> },
                { id: 'soySauce', name: '醤油', saltContent: 0.16, unit: 'ml', type: 'liquid', color: 'bg-amber-50 border-amber-200 text-amber-900', icon: <Droplets /> },
                { id: 'miso', name: '味噌', saltContent: 0.12, unit: 'g', type: 'paste', color: 'bg-orange-50 border-orange-200 text-orange-900', icon: <Utensils /> },
                { id: 'shioKoji', name: '塩麹', saltContent: 0.13, unit: 'g', type: 'paste', color: 'bg-yellow-50 border-yellow-200 text-yellow-800', icon: <span className="text-xl">🌾</span> },
                { id: 'mentsuyu', name: '麺つゆ(3倍)', saltContent: 0.11, unit: 'ml', type: 'liquid', color: 'bg-stone-100 border-stone-300 text-stone-800', icon: <span className="text-xl">🍜</span> }
            ];

            const getSpoonMeasurement = (amount, type) => {
                let tspWeight = 5;
                let tbspWeight = 15;

                if (type === 'solid' || type === 'paste') {
                    tspWeight = 6;
                    tbspWeight = 18;
                } else if (type === 'liquid') {
                    tspWeight = 5;
                    tbspWeight = 15;
                }

                if (amount < tspWeight / 2) return "少々";

                const simpleTbsp = (amount / tbspWeight).toFixed(1);
                if (amount >= tbspWeight) {
                    return `大さじ ${simpleTbsp}`;
                } else {
                    const simpleTsp = (amount / tspWeight).toFixed(1);
                    return `小さじ ${simpleTsp}`;
                }
            };

            const calculateAmount = (item) => {
                const w = parseFloat(weight);
                if (isNaN(w) || w <= 0) return 0;

                const targetSaltAmount = w * TASTE_RATIOS[tasteLevel].ratio;
                const dashiSaltAmount = parseFloat(dashiSalt) || 0;
                const remainingSalt = Math.max(0, targetSaltAmount - dashiSaltAmount);

                let saltContent = item.saltContent;
                if (item.id === 'soySauce' && soySaucePct !== '') {
                    saltContent = parseFloat(soySaucePct) / 100;
                }
                if (item.id === 'miso' && misoPct !== '') {
                    saltContent = parseFloat(misoPct) / 100;
                }
                if (!saltContent || saltContent <= 0) return 0;
                return remainingSalt / saltContent;
            };

            return (
                <div className="flex flex-col items-center py-8 px-4 font-sans text-gray-800">
                    <div className="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
                        <div className="bg-orange-500 p-6 text-white text-center relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-full opacity-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-white via-transparent to-transparent"></div>
                            <ChefHat />
                            <h1 className="text-2xl font-bold relative z-10">味付け計算機v2</h1>
                            <p className="text-orange-100 text-sm mt-1 relative z-10">失敗しない黄金比率</p>
                        </div>

                        <div className="p-6 space-y-6">
                            <div>
                                <label className="flex items-center text-sm font-semibold text-gray-600 mb-2">
                                    <Scale />
                                    材料の重さ (g)
                                </label>
                                <div className="relative">
                                    <input
                                        type="number"
                                        value={weight}
                                        onChange={(e) => setWeight(e.target.value)}
                                        placeholder="例: 200"
                                        className="w-full text-3xl font-bold p-4 text-center border-2 border-gray-200 rounded-xl focus:border-orange-500 focus:ring-4 focus:ring-orange-100 outline-none transition-all placeholder-gray-300"
                                        inputMode="decimal"
                                    />
                                    <span className="absolute right-6 top-1/2 -translate-y-1/2 text-gray-400 font-bold">g</span>
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-semibold text-gray-600 mb-2">味の濃さ</label>
                                <div className="grid grid-cols-3 gap-2 bg-gray-100 p-1 rounded-xl">
                                    {Object.keys(TASTE_RATIOS).map((level) => (
                                        <button
                                            key={level}
                                            onClick={() => setTasteLevel(level)}
                                            className={`py-2 px-1 text-sm font-bold rounded-lg transition-all duration-200 ${tasteLevel === level
                                                ? 'bg-white text-orange-600 shadow-sm ring-1 ring-gray-200'
                                                : 'text-gray-400 hover:text-gray-600'
                                                }`}
                                        >
                                            {TASTE_RATIOS[level].label}
                                        </button>
                                    ))}
                                </div>
                                <p className="text-xs text-center text-gray-400 mt-2">
                                    {TASTE_RATIOS[tasteLevel].description}
                                </p>
                            </div>

                            <div className="bg-blue-50 rounded-xl p-4 space-y-3">
                                <p className="text-xs font-bold text-blue-600 uppercase tracking-wide">オプション設定</p>
                                <div>
                                    <label className="block text-sm font-semibold text-gray-600 mb-1">
                                        だしパックなどの塩の量 (g)
                                        <span className="ml-1 text-xs font-normal text-gray-400">※ この分を差し引いて計算します</span>
                                    </label>
                                    <div className="relative">
                                        <input
                                            type="number"
                                            value={dashiSalt}
                                            onChange={(e) => setDashiSalt(e.target.value)}
                                            placeholder="例: 0.8"
                                            className="w-full p-3 border-2 border-blue-200 rounded-xl focus:border-blue-400 focus:ring-4 focus:ring-blue-100 outline-none transition-all placeholder-gray-300 text-lg font-bold text-center"
                                            inputMode="decimal"
                                        />
                                        <span className="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-sm">g</span>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-600 mb-1">
                                            しょうゆの塩分
                                            <span className="block text-xs font-normal text-gray-400">空欄で標準値(16%)</span>
                                        </label>
                                        <div className="relative">
                                            <input
                                                type="number"
                                                value={soySaucePct}
                                                onChange={(e) => setSoySaucePct(e.target.value)}
                                                placeholder="16"
                                                className="w-full p-3 border-2 border-blue-200 rounded-xl focus:border-blue-400 focus:ring-4 focus:ring-blue-100 outline-none transition-all placeholder-gray-300 text-lg font-bold text-center"
                                                inputMode="decimal"
                                            />
                                            <span className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-sm">%</span>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-600 mb-1">
                                            みその塩分
                                            <span className="block text-xs font-normal text-gray-400">空欄で標準値(12%)</span>
                                        </label>
                                        <div className="relative">
                                            <input
                                                type="number"
                                                value={misoPct}
                                                onChange={(e) => setMisoPct(e.target.value)}
                                                placeholder="12"
                                                className="w-full p-3 border-2 border-blue-200 rounded-xl focus:border-blue-400 focus:ring-4 focus:ring-blue-100 outline-none transition-all placeholder-gray-300 text-lg font-bold text-center"
                                                inputMode="decimal"
                                            />
                                            <span className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 font-bold text-sm">%</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="border-t border-gray-100"></div>

                        <div className="p-6 bg-gray-50/50">
                            <h3 className="text-sm font-bold text-gray-500 mb-4 flex items-center">
                                <Info />
                                いずれか1つを入れる場合の目安
                            </h3>
                            <div className="space-y-3">
                                {(() => {
                                    if (!weight || parseFloat(weight) <= 0) {
                                        return (
                                            <div className="text-center py-8 text-gray-400">
                                                <p>材料の重さを入力すると<br />計算結果が表示されます</p>
                                            </div>
                                        );
                                    }
                                    const w = parseFloat(weight);
                                    const targetSalt = w * TASTE_RATIOS[tasteLevel].ratio;
                                    const dashiSaltAmount = parseFloat(dashiSalt) || 0;
                                    if (dashiSaltAmount > 0 && dashiSaltAmount >= targetSalt) {
                                        return (
                                            <div className="text-center py-6 bg-green-50 rounded-xl border border-green-200">
                                                <p className="text-green-700 font-bold text-lg">🎉 追加の調味料は不要です</p>
                                                <p className="text-green-600 text-sm mt-1">だしパックの塩分で目標塩分が満たされています</p>
                                                <p className="text-gray-400 text-xs mt-2">目標塩分: {Math.round(targetSalt * 10) / 10}g ／ だし塩分: {dashiSaltAmount}g</p>
                                            </div>
                                        );
                                    }
                                    return (
                                        <>
                                            {dashiSaltAmount > 0 && (
                                                <div className="text-xs text-blue-600 bg-blue-50 rounded-lg px-3 py-2">
                                                    だし塩分 {dashiSaltAmount}g を差し引いた残り {Math.round((targetSalt - dashiSaltAmount) * 10) / 10}g 分を計算しています
                                                </div>
                                            )}
                                            {SEASONINGS.map((item) => {
                                                const amount = calculateAmount(item);
                                                const spoonText = getSpoonMeasurement(amount, item.type);
                                                return (
                                                    <div key={item.id} className={`flex items-center justify-between p-4 rounded-xl border-l-4 shadow-sm transition-transform hover:scale-[1.01] ${item.color}`}>
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-10 h-10 rounded-full bg-white/80 flex items-center justify-center shadow-sm text-xl">
                                                                {item.icon}
                                                            </div>
                                                            <span className="font-bold text-lg">{item.name}</span>
                                                        </div>
                                                        <div className="text-right">
                                                            <div className="text-2xl font-bold leading-none">
                                                                {Math.round(amount * 10) / 10}
                                                                <span className="text-sm font-normal ml-1">{item.unit}</span>
                                                            </div>
                                                            <div className="text-xs opacity-80 font-medium mt-1">
                                                                ({spoonText})
                                                            </div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </>
                                    );
                                })()}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
