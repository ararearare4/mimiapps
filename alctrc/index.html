<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>飲酒トラッカー</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (ブラウザ内でReactコードを変換するため) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-neutral-950 text-white select-none overscroll-none">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- SVGアイコンコンポーネント (外部ライブラリ不要にするため直接定義) ---
    const SettingsIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
    const Trash2Icon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const XIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const RotateCcwIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>;
    const InfoIcon = ({ className }) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;

    // --- 定数定義 ---
    const DRINKS = {
      champagne: { id: 'champagne', name: 'シャンパン', icon: '🥂', volume: 120, abv: 12 },
      beer: { id: 'beer', name: 'ビール', icon: '🍺', volume: 350, abv: 5 },
      wine: { id: 'wine', name: '赤ワイン', icon: '🍷', volume: 120, abv: 14 },
      sake: { id: 'sake', name: '日本酒', icon: '🍶', volume: 180, abv: 15 },
    };

    // ローカルストレージを安全に使うためのカスタムフック
    function useStickyState(defaultValue, key) {
      const [value, setValue] = useState(() => {
        try {
          const stickyValue = window.localStorage.getItem(key);
          return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
        } catch (e) {
          return defaultValue;
        }
      });

      useEffect(() => {
        try {
          window.localStorage.setItem(key, JSON.stringify(value));
        } catch (e) {}
      }, [key, value]);

      return [value, setValue];
    }

    // 予想血中アルコール濃度(BAC)等の計算
    const calculateBac = (history, weight, gender, nowTime) => {
      if (!history || history.length === 0) return { bac: 0, remainingGrams: 0, totalGrams: 0 };

      const r = gender === 'female' ? 0.55 : 0.68;
      const eliminationRatePerHour = weight * 0.1; // 1時間に分解されるアルコール量(g)の目安
      const eliminationRatePerMs = eliminationRatePerHour / (60 * 60 * 1000);

      const sortedHistory = [...history].sort((a, b) => a.timestamp - b.timestamp);

      let currentGrams = 0;
      let totalGrams = 0;
      let lastTime = sortedHistory[0].timestamp;

      for (const event of sortedHistory) {
        if (event.timestamp > nowTime) continue;

        totalGrams += event.grams;

        const timePassedMs = event.timestamp - lastTime;
        const eliminated = timePassedMs * eliminationRatePerMs;
        currentGrams = Math.max(0, currentGrams - eliminated);

        currentGrams += event.grams;
        lastTime = event.timestamp;
      }

      const timePassedMsSinceLast = nowTime - lastTime;
      if (timePassedMsSinceLast > 0) {
        const eliminatedLast = timePassedMsSinceLast * eliminationRatePerMs;
        currentGrams = Math.max(0, currentGrams - eliminatedLast);
      }

      // BAC(%) = 残存アルコール量(g) / (体重(kg) * 10 * r)
      const bac = currentGrams / (weight * 10 * r);

      return { bac, remainingGrams: currentGrams, totalGrams };
    };

    // 酔い度合いに応じたUIステータスを取得
    const getStatusInfo = (bac) => {
      if (bac < 0.02) return { color: 'bg-emerald-500', text: 'まだまだいける！', emoji: '😊', textColor: 'text-white' };
      if (bac < 0.05) return { color: 'bg-yellow-400', text: 'いい気分。お水も一緒に', emoji: '😌', textColor: 'text-neutral-900' };
      if (bac < 0.08) return { color: 'bg-orange-500', text: 'ちょっとペース早いかも。', emoji: '🥴', textColor: 'text-white' };
      if (bac < 0.15) return { color: 'bg-red-500', text: 'かなり酔ってます。ストップ！', emoji: '😵', textColor: 'text-white' };
      return { color: 'bg-red-900', text: '危険！飲むのをやめて水を！！', emoji: '🤮', textColor: 'text-white', animate: 'animate-pulse' };
    };

    function App() {
      const [history, setHistory] = useStickyState([], 'drink_tracker_history');
      const [weight, setWeight] = useStickyState(60, 'drink_tracker_weight');
      const [gender, setGender] = useStickyState('male', 'drink_tracker_gender');
      
      const [now, setNow] = useState(Date.now());
      const [settingsOpen, setSettingsOpen] = useState(false);
      const [resetConfirmOpen, setResetConfirmOpen] = useState(false);

      const [tempWeight, setTempWeight] = useState(weight);
      const [tempGender, setTempGender] = useState(gender);

      // 1分ごとに現在時刻を更新してBACを再計算
      useEffect(() => {
        const interval = setInterval(() => {
          setNow(Date.now());
        }, 60000);
        return () => clearInterval(interval);
      }, []);

      const { bac, remainingGrams, totalGrams } = useMemo(() => {
        return calculateBac(history, weight, gender, now);
      }, [history, weight, gender, now]);

      const statusInfo = getStatusInfo(bac);

      const handleAddDrink = (drinkId) => {
        const drink = DRINKS[drinkId];
        const grams = drink.volume * (drink.abv / 100) * 0.8;
        
        const newEvent = {
          id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
          drinkId,
          timestamp: Date.now(),
          grams
        };
        
        setHistory([...history, newEvent]);
        setNow(Date.now());
        
        if (navigator.vibrate) navigator.vibrate(50);
      };

      const handleUndo = () => {
        if (history.length === 0) return;
        setHistory(history.slice(0, -1));
        setNow(Date.now());
      };

      const handleReset = () => {
        setHistory([]);
        setNow(Date.now());
        setResetConfirmOpen(false);
      };

      const saveSettings = () => {
        setWeight(Number(tempWeight) || 60);
        setGender(tempGender);
        setNow(Date.now());
        setSettingsOpen(false);
      };

      return (
        <div className="min-h-[100dvh] font-sans flex flex-col items-center relative">
          <div className="w-full max-w-md p-4 flex flex-col h-full min-h-[100dvh]">
            
            {/* ヘッダー */}
            <header className="flex justify-between items-center mb-3">
              <h1 className="text-xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400">
                DRINK TRACKER
              </h1>
              <button 
                onClick={() => {
                  setTempWeight(weight);
                  setTempGender(gender);
                  setSettingsOpen(true);
                }} 
                className="p-2 rounded-full bg-neutral-900 active:bg-neutral-800 transition-colors"
              >
                <SettingsIcon className="w-5 h-5 text-neutral-400" />
              </button>
            </header>

            {/* ステータスカード */}
            <div className={`p-4 rounded-3xl transition-all duration-500 ${statusInfo.color} ${statusInfo.textColor} ${statusInfo.animate || ''} shadow-xl mb-4 flex flex-col items-center text-center relative overflow-hidden`}>
              <div className="text-5xl mb-2 drop-shadow-md z-10">{statusInfo.emoji}</div>
              <h2 className="text-lg font-bold mb-3 leading-snug z-10">{statusInfo.text}</h2>
              
              <div className="flex flex-col items-center z-10 bg-black/10 backdrop-blur-sm p-3 rounded-2xl w-full">
                <span className="text-xs font-bold opacity-80 mb-1 uppercase tracking-wider">予想血中アルコール濃度</span>
                <span className="text-4xl font-black tracking-tighter">{bac.toFixed(3)}<span className="text-xl">%</span></span>
                
                <div className="flex justify-around w-full mt-3 pt-2 border-t border-white/20 text-xs font-medium">
                  <div>
                    <span className="opacity-80 block mb-0.5">総アルコール</span>
                    <span className="text-sm font-bold">{totalGrams.toFixed(1)}g</span>
                  </div>
                  <div>
                    <span className="opacity-80 block mb-0.5">体内の残量</span>
                    <span className="text-sm font-bold">{remainingGrams.toFixed(1)}g</span>
                  </div>
                </div>
              </div>
            </div>

            {/* 記録ボタンエリア */}
            <div className="grid grid-cols-2 gap-3 mb-4">
              {Object.values(DRINKS).map(drink => (
                <button
                  key={drink.id}
                  onClick={() => handleAddDrink(drink.id)}
                  className="bg-neutral-900 border-2 border-neutral-800 rounded-2xl p-4 flex flex-col items-center justify-center gap-2 active:scale-95 active:border-blue-500 transition-all duration-150 shadow-md"
                >
                  <div className="text-4xl drop-shadow-md">{drink.icon}</div>
                  <div className="text-center">
                    <div className="font-bold text-base text-neutral-100">{drink.name}</div>
                    <div className="text-[10px] text-neutral-500">{drink.volume}ml / {drink.abv}%</div>
                  </div>
                </button>
              ))}
            </div>

            {/* 取り消しボタン */}
            {history.length > 0 && (
              <div className="flex justify-center mb-4">
                <button 
                  onClick={handleUndo} 
                  className="flex items-center gap-2 px-5 py-3 bg-neutral-900/80 rounded-full text-neutral-400 active:bg-neutral-800 transition-colors border border-neutral-800 shadow-sm"
                >
                  <RotateCcwIcon className="w-4 h-4" />
                  <span className="font-bold text-xs">直前の記録を取り消す</span>
                </button>
              </div>
            )}

            {/* 履歴リスト */}
            <div className="flex-1 overflow-y-auto pb-6">
              <div className="flex justify-between items-end mb-3 px-1">
                <h3 className="text-base font-bold text-neutral-400">今日の記録</h3>
                {history.length > 0 && (
                  <button 
                    onClick={() => setResetConfirmOpen(true)} 
                    className="text-xs text-red-400 flex items-center gap-1 font-bold p-1.5 active:bg-neutral-900 rounded-lg"
                  >
                    <Trash2Icon className="w-3.5 h-3.5" /> 全てリセット
                  </button>
                )}
              </div>
              
              <div className="space-y-2">
                {history.slice().reverse().map(event => {
                  const drink = DRINKS[event.drinkId];
                  const time = new Date(event.timestamp).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
                  return (
                    <div key={event.id} className="flex justify-between items-center bg-neutral-900 p-3 rounded-xl border border-neutral-800/50">
                      <div className="flex items-center gap-3">
                        <span className="text-2xl">{drink.icon}</span>
                        <div>
                          <div className="font-bold text-sm text-neutral-200">{drink.name}</div>
                          <div className="text-[10px] font-mono text-neutral-500 mt-0.5">{time}</div>
                        </div>
                      </div>
                      <div className="text-xs font-black text-blue-400 bg-blue-400/10 px-2.5 py-1 rounded-md">
                        +{event.grams.toFixed(1)}g
                      </div>
                    </div>
                  );
                })}
                
                {history.length === 0 && (
                  <div className="text-center text-neutral-600 py-6 text-sm font-medium flex flex-col items-center gap-2">
                    <InfoIcon className="w-6 h-6 opacity-50" />
                    記録はありません。ボタンをタップして開始。
                  </div>
                )}
              </div>
            </div>

          </div>

          {/* 設定モーダル */}
          {settingsOpen && (
            <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-md">
              <div className="bg-neutral-900 border border-neutral-800 p-6 rounded-3xl w-full max-w-sm relative shadow-2xl">
                <button onClick={() => setSettingsOpen(false)} className="absolute top-4 right-4 text-neutral-500 active:text-white p-2">
                  <XIcon className="w-5 h-5" />
                </button>
                <h2 className="text-xl font-black mb-5 text-white tracking-wide">設定</h2>
                
                <div className="space-y-5 mb-6">
                  <div>
                    <label className="block text-xs font-bold text-neutral-400 mb-2">体重 (kg)</label>
                    <input 
                      type="number" 
                      value={tempWeight}
                      onChange={(e) => setTempWeight(e.target.value)}
                      className="w-full bg-neutral-950 border-2 border-neutral-800 rounded-xl p-3 text-white text-lg font-bold focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-center"
                    />
                  </div>
                  
                  <div>
                    <label className="block text-xs font-bold text-neutral-400 mb-2">性別 (係数計算用)</label>
                    <div className="grid grid-cols-2 gap-2">
                      <button
                        onClick={() => setTempGender('male')}
                        className={`p-3 rounded-xl font-bold border-2 transition-all ${tempGender === 'male' ? 'bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-900/20' : 'bg-neutral-950 border-neutral-800 text-neutral-400'}`}
                      >
                        男性
                      </button>
                      <button
                        onClick={() => setTempGender('female')}
                        className={`p-3 rounded-xl font-bold border-2 transition-all ${tempGender === 'female' ? 'bg-pink-600 border-pink-500 text-white shadow-lg shadow-pink-900/20' : 'bg-neutral-950 border-neutral-800 text-neutral-400'}`}
                      >
                        女性
                      </button>
                    </div>
                  </div>
                </div>

                <p className="text-[10px] text-neutral-500 mb-5 leading-relaxed">
                  ※血中アルコール濃度はWidmark式を用いた目安です。実際の酔い度合いは体調や体質により異なります。
                </p>

                <button 
                  onClick={saveSettings}
                  className="w-full bg-white text-black font-black text-base py-3 rounded-xl active:scale-95 transition-transform"
                >
                  保存して閉じる
                </button>
              </div>
            </div>
          )}

          {/* リセット確認モーダル */}
          {resetConfirmOpen && (
            <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4 backdrop-blur-md">
              <div className="bg-neutral-900 border border-neutral-800 p-5 rounded-3xl w-full max-w-sm text-center shadow-2xl">
                <div className="w-12 h-12 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-3 text-red-500">
                  <Trash2Icon className="w-6 h-6" />
                </div>
                <h2 className="text-lg font-black mb-1 text-white">履歴をリセットしますか？</h2>
                <p className="text-xs text-neutral-400 mb-6">この操作は取り消せません。</p>
                
                <div className="grid grid-cols-2 gap-3">
                  <button 
                    onClick={() => setResetConfirmOpen(false)}
                    className="p-3 rounded-xl font-bold bg-neutral-800 text-white active:bg-neutral-700 transition-colors"
                  >
                    キャンセル
                  </button>
                  <button 
                    onClick={handleReset}
                    className="p-3 rounded-xl font-bold bg-red-600 text-white active:bg-red-700 transition-colors"
                  >
                    リセット
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
